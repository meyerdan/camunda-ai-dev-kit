<!DOCTYPE html>
<html>
<head>
  <title>BPMN Viewer</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #canvas { width: 100vw; height: calc(100vh - 40px); }
    #toolbar { height: 40px; display: flex; align-items: center; padding: 0 12px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    button { margin-right: 8px; padding: 4px 12px; cursor: pointer; }
  </style>
  <script src="https://unpkg.com/bpmn-js/dist/bpmn-navigated-viewer.production.min.js"></script>
</head>
<body>
  <div id="toolbar">
    <button onclick="loadBpmn()">Reload</button>
    <button onclick="viewer.get('canvas').zoom('fit-viewport')">Fit</button>
  </div>
  <div id="canvas"></div>
  <script>
    const viewer = new BpmnJS({ container: '#canvas' });

    async function loadBpmn() {
      const res = await fetch('/bpmn');
      const xml = await res.text();
      await viewer.importXML(xml);
      viewer.get('canvas').zoom('fit-viewport');
    }

    loadBpmn();
  </script>
</body>
</html>
